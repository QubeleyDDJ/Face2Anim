name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.check.outputs.config_package }}
    steps:
      - name: Check PACKAGE_NAME variable
        id: check
        run: |
          if [ -n "${{ vars.PACKAGE_NAME }}" ]; then
            echo "config_package=true" >> $GITHUB_OUTPUT
          else
            echo "config_package=false" >> $GITHUB_OUTPUT
            echo "Repository Variable PACKAGE_NAME is not set."
          fi

  build:
    needs: config
    if: needs.config.outputs.config_package == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PACKAGE_PATH: Packages/${{ vars.PACKAGE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        uses: zoexx/github-action-json-file-properties@1.0.6
        with:
          file_path: ${{ env.PACKAGE_PATH }}/package.json
          prop_path: version

      - name: Set filenames
        run: |
          echo "PACKAGE_VERSION=${{ steps.version.outputs.value }}" >> $GITHUB_ENV
          echo "ZIP_FILE=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.zip" >> $GITHUB_ENV
          echo "UNITYPACKAGE_FILE=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.unitypackage" >> $GITHUB_ENV

      - name: Create zip
        working-directory: ${{ env.PACKAGE_PATH }}
        run: |
          zip -r "${{ github.workspace }}/${{ env.ZIP_FILE }}" .

      - name: Collect meta files
        run: |
          find "${{ env.PACKAGE_PATH }}/" -name "*.meta" > metaList

      - name: Create unitypackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.UNITYPACKAGE_FILE }}
          include-files: metaList

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ env.PACKAGE_VERSION }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACKAGE_VERSION }}
          files: |
            ${{ env.ZIP_FILE }}
            ${{ env.UNITYPACKAGE_FILE }}
            ${{ env.PACKAGE_PATH }}/package.json
